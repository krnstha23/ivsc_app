services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-ivcs}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: "${POSTGRES_DB:-ivcs_db}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ivcs} -d ${POSTGRES_DB:-ivcs_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ivcs}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ivcs_db}?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:?Set AUTH_SECRET in .env}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      GOOGLE_SERVICE_ACCOUNT_KEY_PATH: "secrets/google-meet-key.json"
      GOOGLE_MEET_HOST_EMAIL: "${GOOGLE_MEET_HOST_EMAIL:?Set GOOGLE_MEET_HOST_EMAIL in .env}"
    volumes:
      - /etc/scoremirror/secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build:
      context: .
      target: builder
    command: sh -c "npx prisma migrate deploy --schema ./prisma/schema.prisma"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ivcs}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ivcs_db}?schema=public"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: .
      target: builder
    command: sh -c "npx prisma db seed"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-ivcs}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ivcs_db}?schema=public"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
