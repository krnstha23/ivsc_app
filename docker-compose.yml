services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ivcs
      POSTGRES_PASSWORD: ivcs_secret
      POSTGRES_DB: ivcs_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ivcs -d ivcs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://ivcs:ivcs_secret@db:5432/ivcs_db?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:?Set AUTH_SECRET in .env}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build: .
    command: >
      sh -c "npx prisma migrate deploy --schema ./prisma/schema.prisma"
    environment:
      DATABASE_URL: "postgresql://ivcs:ivcs_secret@db:5432/ivcs_db?schema=public"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
